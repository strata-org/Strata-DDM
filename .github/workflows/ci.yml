name: Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build_and_test_lean:
    name: Build and test Lean
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build StrataDDM and tests
        # Building StrataDDMTest runs the test suite: the tests are
        # `#guard_msgs` / `#eval` checks that execute during elaboration.
        uses: leanprover/lean-action@v1
        with:
          build-args: StrataDDM StrataDDMTest
          test: false
          use-github-cache: true

  lint_checks:
    name: Run lint checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Check copyright headers
        run: python3 .github/scripts/check_copyright_headers.py .
        shell: bash
      - name: Check for trailing whitespace
        run: .github/scripts/lintWhitespace.sh
      - name: Check for import Lean
        run: .github/scripts/checkLeanImport.sh
