name: Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build_and_test_lean:
    name: Build and test Lean
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Build StrataDDM and tests
        # Building StrataDDMTest runs the test suite: the tests are
        # `#guard_msgs` / `#eval` checks that execute during elaboration.
        uses: leanprover/lean-action@v1
        with:
          build-args: StrataDDM StrataDDMTest
          test: false
          use-github-cache: true

  lint_checks:
    name: Run lint checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: strata-org/Strata/.github/actions/check-copyright-headers@main
      - uses: strata-org/Strata/.github/actions/lint-whitespace@main
        with:
          directory: .
      - uses: strata-org/Strata/.github/actions/check-lean-import@main
